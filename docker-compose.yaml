services:
  mulpaz:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mulpaz-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PORT=3000
      - DATABASE_URL=file:./mulpaz.db
      - NEXT_PUBLIC_BASE_URL=https://market.erkanerdem.online
      - CRON_SECRET=mulpaz-cron-secret-2026
